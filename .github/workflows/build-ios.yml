name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Build app
      run: |
        xcodebuild build \
          -scheme DiaBLE \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
    
    - name: Find built app
      run: |
        echo "Looking for built app..."
        find build -name "*.app" -type d
        ls -la build/Build/Products/ 2>/dev/null || echo "Release-iphoneos not found"
        find build -name "DiaBLE*" -type d | head -20
    
    - name: Create IPA
      run: |
        # Find the actual app location
        APP_PATH=$(find build -name "DiaBLE.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: DiaBLE.app not found!"
          exit 1
        fi
        
        echo "Found app at: $APP_PATH"
        
        mkdir -p build/Payload
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r DiaBLE.ipa Payload/
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: DiaBLE.ipa
        path: build/DiaBLE.ipa