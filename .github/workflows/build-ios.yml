name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Build app
      run: |
        xcodebuild build \
          -scheme DiaBLE \
          -configuration Release \
          -derivedDataPath build \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
    
    - name: Create IPA
      run: |
        # Find the app
        APP_PATH=$(find build -name "DiaBLE.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: App not found!"
          find build -type d -name "*.app"
          exit 1
        fi
        
        echo "Using app: $APP_PATH"
        
        # Create IPA structure
        mkdir -p build/ipa/Payload
        cp -r "$APP_PATH" build/ipa/Payload/
        
        # Verify Info.plist exists
        if [ ! -f "build/ipa/Payload/DiaBLE.app/Info.plist" ]; then
          echo "ERROR: Info.plist not found in app!"
          ls -la "$APP_PATH/"
          exit 1
        fi
        
        # Create the IPA
        cd build/ipa
        zip -r ../DiaBLE.ipa Payload/
        cd ../../
        
        ls -lh build/DiaBLE.ipa
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: DiaBLE.ipa
        path: build/DiaBLE.ipa