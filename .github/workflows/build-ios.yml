name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Build app
      run: |
        xcodebuild build \
          -scheme DiaBLE \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
    
    - name: Create IPA from app
      run: |
        APP_PATH="build/Build/Products/Release-iphoneos/DiaBLE.app"
        IPA_PATH="build/DiaBLE.ipa"
        
        mkdir -p "$IPA_PATH/Payload"
        cp -r "$APP_PATH" "$IPA_PATH/Payload/"
        
        # Create minimal Info.plist if needed
        cd "$IPA_PATH"
        zip -r DiaBLE.ipa Payload/
        mv DiaBLE.ipa ../
        cd ..
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: DiaBLE.ipa
        path: build/DiaBLE.ipa