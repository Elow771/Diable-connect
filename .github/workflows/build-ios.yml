name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Select Xcode version
      run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
    
    - name: Install dependencies
      run: |
        if [ -f "Podfile" ]; then
          pod install
        fi
    
    - name: Build and Archive
      run: |
        xcodebuild archive \
          -scheme DiaBLE \
          -configuration Release \
          -archivePath build/DiaBLE.xcarchive \
          -verbose \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          PROVISIONING_PROFILE="" \
          PROVISIONING_PROFILE_SPECIFIER=""
    
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/DiaBLE.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath build/export \
          -allowProvisioningUpdates || true
        
        # If export fails, try with no signing
        if [ ! -f "build/export/DiaBLE.ipa" ]; then
          mkdir -p build/export
          cd build/DiaBLE.xcarchive/Products/Applications
          zip -r ../../../export/DiaBLE.ipa DiaBLE.app
        fi
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: DiaBLE.ipa
        path: build/export/DiaBLE.ipa